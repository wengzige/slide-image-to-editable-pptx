interface:
  display_name: "Slide Image → Editable PPTX"
  short_description: "Convert slide screenshots into high-fidelity editable PowerPoint with $imagegen-generated visuals and native text/shapes."
  default_prompt: "Convert the provided slide images into an editable PPTX. Analyze each slide, generate clean visual assets with $imagegen, and build the deck with @presentations. All text must be editable, all complex visuals must be clean PNGs without text."
policy:
  allow_implicit_invocation: true
